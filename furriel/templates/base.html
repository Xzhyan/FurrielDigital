<!-- Arquivos estaticos -->
{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <!-- Tailwindcss CDN -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->

    <link rel="stylesheet" href="{% static 'furriel/output.css' %}">
</head>
<body class="min-h-screen flex flex-col bg-zinc-900 text-gray-300">
    <header class="flex">
        <div class="w-full bg-slate-950 p-2 text-center shadow-md">
            <h1 class="font-semibold">Furriel Digital</h1>
        </div>
    </header>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="flex justify-center items-center w-full h-20 bg-slate-950">
        <p>&copy; 2026, Cb Leandro Santos</p>
    </footer>
</body>
</html>
